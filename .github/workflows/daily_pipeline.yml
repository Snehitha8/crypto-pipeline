name: Daily Crypto Pipeline

on:
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch:

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install requests pandas google-cloud-bigquery google-cloud-storage dbt-bigquery

      - name: Set up Google credentials
        env:
          GCP_CREDENTIALS: ${{ secrets.GCP_CREDENTIALS }}
        run: |
          echo "$GCP_CREDENTIALS" > credentials.json
          wc -c credentials.json
          head -c 50 credentials.json
        shell: bash

      - name: Run extract
        run: python extract.py

      - name: Run load to BigQuery
        run: python load_to_bigquery.py

      - name: Run dbt
        run: |
          cd crypto_transforms
          dbt run
          dbt test