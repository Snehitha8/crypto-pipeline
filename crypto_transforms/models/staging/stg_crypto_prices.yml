version: 2

models:
  - name: stg_crypto_prices
    columns:
      - name: coin_id
        tests:
          - not_null
      - name: price_usd
        tests:
          - not_null
      - name: price_date
        tests:
          - not_null

  - name: dim_coins
    columns:
      - name: coin_id
        tests:
          - not_null
          - unique
      - name: name
        tests:
          - not_null

  - name: fact_crypto_prices
    columns:
      - name: price_id
        tests:
          - not_null
          - unique
      - name: coin_id
        tests:
          - not_null
      - name: price_usd
        tests:
          - not_null